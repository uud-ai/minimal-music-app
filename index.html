<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFFFF0">
    <title>Minimal Music</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>My Music</h1>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Поиск в Jamendo...">
            </div>
        </header>

        <main id="player-container">
            <div id="track-list">
                <p class="status">Введите название песни для поиска</p>
            </div>
        </main>

        <div id="audio-wrapper">
            <audio id="main-player" controls style="display: none; width: 100%;"></audio>
        </div>

        <nav class="bottom-nav">
            <button id="nav-search" class="active">
                <span class="icon">🔍</span> Поиск
            </button>
            <button id="nav-library">
                <span class="icon">🎵</span> Моя музыка
            </button>
        </nav>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
